services:
  app:
    build:
      context: .
      secrets:
        - google_client_id
        - google_client_secret
        - nextauth_secret
        - nextauth_url
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/database.sqlite:/app/database.sqlite
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

secrets:
  google_client_id:
    environment: GOOGLE_CLIENT_ID
  google_client_secret:
    environment: GOOGLE_CLIENT_SECRET
  nextauth_secret:
    environment: NEXTAUTH_SECRET
  nextauth_url:
    environment: NEXTAUTH_URL
