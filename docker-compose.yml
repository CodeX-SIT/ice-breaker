services:
  postgres:
    image: postgres:16-alpine
    container_name: ice-breaker-postgres
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - ice-breaker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ice-breaker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ice-breaker:
    build:
      context: .
      dockerfile: dockerfile
      tags:
        - matricaldefunkt/ice-breaker-app:latest
    image: matricaldefunkt/ice-breaker-app:latest
    container_name: ice-breaker-app
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - ice-breaker-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: matricaldefunkt/ice-breaker-nginx:latest
    container_name: ice-breaker-nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
      tags:
        - matricaldefunkt/ice-breaker-nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-logs:/var/log/nginx
    networks:
      - ice-breaker-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "--no-check-certificate",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      ice-breaker:
        condition: service_healthy

networks:
  ice-breaker-network:
    driver: bridge
    name: ice-breaker-network